<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aleatoric Vector Studio (Copy & Paste Details)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3EEE2;
    --paper-deep:#EAE3D2;
    --ruled:#DDD3B8;
    --panel:#FBF9F3;
    --ink:#211D18;
    --ink-soft:#6B6255;
    --ink-faint:#948A78;
    --rubric:#9C3D2E;
    --rubric-soft:#C97361;
    --border:#D8CFB8;
    --good:#4B6350;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:1400px;
    margin:0 auto;
    padding:28px 24px 60px;
  }
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    border-bottom:1px solid var(--border);
    padding-bottom:16px;
    margin-bottom:22px;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:28px;
    letter-spacing:-0.01em;
    margin:0;
  }
  h1 em{
    font-style:italic;
    color:var(--rubric);
    font-weight:500;
  }
  .subtitle{
    font-size:13px;
    color:var(--ink-soft);
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:0.01em;
  }
  .layout{
    display:grid;
    grid-template-columns:230px 1fr 300px;
    grid-template-areas:
      "elements canvas export"
      "params params params";
    gap:18px;
    align-items:start;
  }
  .panel-elements{grid-area:elements;}
  .panel-canvas{grid-area:canvas; min-width:0;}
  .panel-export{grid-area:export;}
  .panel-params{grid-area:params;}
  @media (max-width:1080px){
    .layout{
      grid-template-columns:1fr;
      grid-template-areas:
        "elements"
        "canvas"
        "export"
        "params";
    }
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:3px;
  }
  .panel-head{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    padding:12px 14px;
    border-bottom:1px solid var(--border);
  }
  .panel-body{padding:12px 14px;}

  /* ---- add buttons ---- */
  .add-row{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .add-btn{
    display:flex;align-items:center;gap:8px;
    background:var(--paper);
    border:1px solid var(--border);
    border-radius:3px;
    padding:8px 10px;
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:500;
    color:var(--ink);
    cursor:pointer;
    text-align:left;
    transition:border-color .15s ease, background .15s ease;
  }
  .add-btn:hover{border-color:var(--rubric-soft); background:#fff;}
  .add-btn .icon{
    width:16px;height:16px;flex:none;
    display:flex;align-items:center;justify-content:center;
  }
  .add-btn svg{width:16px;height:16px;stroke:var(--ink-soft);}

  /* ---- layers list ---- */
  .layers{display:flex;flex-direction:column;gap:5px;}
  .layer-row{
    display:flex;align-items:center;gap:7px;
    padding:7px 8px;
    border:1px solid transparent;
    border-radius:3px;
    cursor:pointer;
    font-size:12.5px;
  }
  .layer-row:hover{background:var(--paper-deep);}
  .layer-row.selected{
    border-color:var(--rubric-soft);
    background:#fff;
  }
  .layer-row .name{flex:1; overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .layer-row .tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:9.5px;
    color:var(--ink-faint);
    text-transform:uppercase;
    background:var(--paper-deep);
    padding:2px 5px;
    border-radius:2px;
  }
  .layer-row button{
    background:none;border:none;cursor:pointer;
    color:var(--ink-faint);
    font-size:13px;
    line-height:1;
    padding:2px 4px;
  }
  .layer-row button:hover{color:var(--rubric);}
  .empty-note{
    font-size:12px;color:var(--ink-faint);
    font-style:italic;
    padding:6px 2px;
  }

  /* ---- canvas area ---- */
  .canvas-toolbar{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:10px 14px;
    border-bottom:1px solid var(--border);
    font-size:12px;
    color:var(--ink-soft);
  }
  .canvas-toolbar label{display:flex;align-items:center;gap:4px;}
  .canvas-toolbar input[type=number]{width:56px;}
  .canvas-toolbar .hint{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--ink-faint);
  }
  .canvas-wrap{
    padding:34px;
    text-align:center;
    overflow:auto;
    max-height:550px;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 23px, var(--ruled) 23px, var(--ruled) 24px);
    background-size:100% 24px;
  }
  .canvas-wrap.no-grid{background:none;}
  .canvas-frame{
    position:relative;
    display:inline-block;
    text-align:left;
    background:var(--paper);
    box-shadow:0 1px 3px rgba(33,29,24,0.15), 0 0 0 1px var(--border);
    border-radius:2px;
  }
  svg#stage{display:block;}
  svg#stage.adding-points{cursor:crosshair;}
  .canvas-resize-handle{
    position:absolute;
    width:14px;height:14px;
    right:-7px;bottom:-7px;
    background:var(--rubric);
    border:2px solid var(--panel);
    border-radius:2px;
    cursor:nwse-resize;
    z-index:5;
  }

  /* selection / handles inside svg */
  .layer-group, .layer-group *{cursor:move;}
  .sel-outline{fill:none; stroke:var(--rubric); stroke-width:1; stroke-dasharray:3,4; opacity:0.35; pointer-events:none; vector-effect:non-scaling-stroke;}
  .handle{fill:var(--rubric); stroke:#fff; stroke-width:1; cursor:grab;}
  .handle.amp{fill:var(--good);}
  .handle.pt{cursor:move;}
  .handle[data-role="resize-e"], .handle[data-role="line-end"]{cursor:ew-resize;}
  .handle[data-role="resize-s"], .handle[data-role="line-amp"]{cursor:ns-resize;}
  .handle[data-role="resize-se"]{cursor:nwse-resize;}

  /* ---- param controls ---- */
  .param-tabs{
    display:inline-flex; gap:2px; flex-wrap:wrap;
    margin-bottom:18px;
    padding:3px;
    background:var(--paper-deep);
    border:1px solid var(--border);
    border-radius:5px;
  }
  .param-tab{
    background:none;border:none;cursor:pointer;
    padding:7px 13px;
    border-radius:3px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;text-transform:uppercase;letter-spacing:0.06em;
    color:var(--ink-soft);
    transition:background .15s ease, color .15s ease;
  }
  .param-tab:hover{color:var(--ink); background:rgba(255,255,255,0.55);}
  .param-tab.active{color:var(--rubric); background:#fff; box-shadow:0 1px 2px rgba(33,29,24,0.14);}
  .param-tab-panel{display:none;}
  .param-tab-panel.active{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
    gap:6px 22px;
    align-items:start;
    max-width:900px;
  }
  .param-subhead{
    grid-column:1/-1;
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;text-transform:uppercase;letter-spacing:0.08em;
    color:var(--ink-faint);
    border-top:1px solid var(--border);
    margin-top:10px; padding-top:12px;
  }
  .param-subhead:first-child{border-top:none; margin-top:0; padding-top:0;}
  .field{margin-bottom:16px;}
  .field:last-child{margin-bottom:0;}
  .field-row{display:flex; gap:12px; margin-bottom:16px;}
  .field-row:last-child{margin-bottom:0;}
  .field-row .field{flex:1; margin-bottom:0; min-width:0;}
  .field label{
    display:flex;justify-content:space-between;align-items:center;
    gap:6px;
    font-size:11.5px;
    color:var(--ink-soft);
    margin-bottom:6px;
    font-family:'IBM Plex Mono',monospace;
  }
  .field label .val-input{
    width:56px !important;
    flex:none;
    padding:2px 5px !important;
    border:1px solid var(--border);
    border-radius:2px;
    background:#fff;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink);
    text-align:right;
  }
  .field label .val-input:focus{border-color:var(--rubric-soft); outline:none;}
  .field input[type=range]{
    width:100%;
    accent-color:var(--rubric);
  }
  .field select, .field input[type=number], .field input[type=text]{
    width:100%;
    padding:6px 8px;
    border:1px solid var(--border);
    border-radius:3px;
    background:#fff;
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    color:var(--ink);
  }
  .field input[type=color]{
    width:100%;height:30px;border:1px solid var(--border);border-radius:3px;background:#fff;padding:2px;
  }
  .field.checkbox{display:flex;align-items:center;gap:8px;}
  .field.checkbox label{margin:0;}
  .divider{
    border:none;border-top:1px solid var(--border);
    margin:14px 0;
  }
  .no-selection{
    color:var(--ink-faint);
    font-size:13px;
    font-style:italic;
    padding:20px 4px;
    text-align:center;
  }
  .mouse-note{
    font-size:11px;
    color:var(--ink-faint);
    font-style:italic;
    margin:-4px 0 12px;
    line-height:1.4;
  }

  /* ---- export ---- */
  .export-btns{display:flex;gap:8px;margin-bottom:10px;}
  .btn{
    flex:1;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:3px;
    padding:9px 10px;
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    font-weight:600;
    letter-spacing:0.01em;
    cursor:pointer;
    transition:background .15s ease;
  }
  .btn:hover{background:var(--rubric);}
  .btn.secondary{
    background:var(--paper);
    color:var(--ink);
    border:1px solid var(--border);
  }
  .btn.secondary:hover{background:var(--paper-deep); color:var(--ink);}
  textarea#svgOut{
    width:100%;
    height:130px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    line-height:1.5;
    padding:8px;
    border:1px solid var(--border);
    border-radius:3px;
    background:var(--paper-deep);
    color:var(--ink-soft);
    resize:vertical;
  }
  .copy-flash{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--good);
    height:14px;
    margin-top:4px;
  }

  /* ---- toolbar ---- */
  .toolbar{
    display:flex;align-items:center;gap:2px;
    padding:6px 8px;
    margin-bottom:20px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:5px;
  }
  .tsep{width:1px;align-self:stretch;margin:4px 5px;background:var(--border);}
  .tbtn{
    display:flex;align-items:center;gap:6px;
    background:none;border:none;border-radius:3px;
    padding:6px 9px;
    font-family:'Inter',sans-serif;
    font-size:12px;font-weight:500;
    color:var(--ink);
    cursor:pointer;
    white-space:nowrap;
  }
  .tbtn.icon-only{
    font-size:14px;
    padding:6px 8px;
    line-height:1;
  }
  .tbtn:hover:not(:disabled){background:var(--paper-deep);}
  .tbtn:disabled{color:var(--ink-faint); cursor:not-allowed; opacity:0.4;}
  .toolbar-spacer{flex:1;}
  .autosave-indicator{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;color:var(--ink-faint);
    display:flex;align-items:center;gap:5px;
    padding-right:4px;
  }
  .autosave-dot{width:6px;height:6px;border-radius:50%;background:var(--good); opacity:0.35; transition:opacity .3s ease;}
  .autosave-dot.pulse{opacity:1;}

  .tmenu-wrap{position:relative;}
  .tmenu{
    position:absolute; top:calc(100% + 4px); left:0;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:5px;
    box-shadow:0 6px 18px rgba(33,29,24,0.15);
    display:flex; flex-direction:column;
    min-width:210px;
    z-index:50;
    padding:4px;
  }
  .tmenu.hidden{display:none;}
  .tmenu button{
    text-align:left; background:none; border:none; cursor:pointer;
    padding:8px 10px; border-radius:3px;
    font-family:'Inter',sans-serif; font-size:12.5px; color:var(--ink);
  }
  .tmenu button:hover{background:var(--paper-deep);}

  /* ---- toast ---- */
  .toast-wrap{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    z-index:200;
    display:flex; flex-direction:column; gap:6px;
    align-items:center;
    pointer-events:none;
  }
  .toast{
    background:var(--ink); color:var(--paper);
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    padding:8px 16px;
    border-radius:20px;
    box-shadow:0 3px 10px rgba(0,0,0,0.25);
    opacity:0; transform:translateY(6px);
    transition:opacity .18s ease, transform .18s ease;
  }
  .toast.show{opacity:1; transform:translateY(0);}

  /* ---- modal ---- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(33,29,24,0.45);
    display:flex; align-items:center; justify-content:center;
    z-index:150; padding:20px;
  }
  .modal-overlay.hidden{display:none;}
  .modal{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:6px;
    width:100%; max-width:480px;
    max-height:80vh;
    display:flex; flex-direction:column;
    box-shadow:0 12px 30px rgba(0,0,0,0.25);
  }
  .modal-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px;
    border-bottom:1px solid var(--border);
    font-family:'Fraunces',serif; font-size:17px; font-weight:600;
  }
  .modal-head button{
    background:none;border:none;font-size:18px;cursor:pointer;color:var(--ink-soft);
    line-height:1; padding:2px 6px;
  }
  .modal-head button:hover{color:var(--rubric);}
  .modal-body{padding:16px 18px; overflow-y:auto;}
  .modal-foot{padding:12px 18px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end;}

  .shortcut-list{display:flex; flex-direction:column; gap:2px;}
  .shortcut-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:7px 2px;
    border-bottom:1px solid var(--paper-deep);
    font-size:13px;
  }
  .shortcut-row:last-child{border-bottom:none;}
  .shortcut-row .keys{display:flex; gap:4px;}
  .shortcut-row .keys kbd{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    background:var(--paper-deep);
    border:1px solid var(--border);
    border-bottom-width:2px;
    border-radius:3px;
    padding:2px 6px;
    color:var(--ink);
  }

  .project-row{
    display:flex;align-items:center;gap:8px;
    padding:9px 8px;
    border:1px solid var(--border);
    border-radius:3px;
    margin-bottom:6px;
    font-size:13px;
  }
  .project-row .pname{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500;}
  .project-row .pmeta{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ink-faint);}
  .project-row button{
    background:none;border:1px solid var(--border);border-radius:3px;
    cursor:pointer; font-size:11px; padding:4px 8px; color:var(--ink-soft);
    font-family:'Inter',sans-serif;
  }
  .project-row button:hover{border-color:var(--rubric-soft); color:var(--rubric);}
  .save-name-row{display:flex; gap:8px; margin-bottom:14px;}
  .save-name-row input{
    flex:1; padding:8px 10px; border:1px solid var(--border); border-radius:3px;
    font-family:'Inter',sans-serif; font-size:13px;
  }

  .wave-readout{
    display:flex; flex-wrap:wrap; gap:0;
    border:1px solid var(--border); border-radius:3px;
    margin:-2px 0 14px; overflow:hidden;
  }
  .wave-readout .cell{
    flex:1; min-width:80px;
    padding:7px 10px;
    border-right:1px solid var(--border);
    background:var(--paper);
  }
  .wave-readout .cell:last-child{border-right:none;}
  .wave-readout .l{
    font-family:'IBM Plex Mono',monospace; font-size:9px; text-transform:uppercase;
    letter-spacing:0.06em; color:var(--ink-faint);
  }
  .wave-readout .v{
    font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--rubric); margin-top:1px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>Aleatoric Vector <em>Studio</em></h1>
    </div>
    <div class="subtitle">lines · boxes · shapes → SVG for MuseScore</div>
  </header>

  <div class="toolbar">
    <button class="tbtn icon-only" onclick="newProject()" title="New project">✚</button>
    <div class="tsep"></div>
    <button class="tbtn icon-only" id="undoBtn" onclick="undo()" title="Undo (Ctrl Z)">↶</button>
    <button class="tbtn icon-only" id="redoBtn" onclick="redo()" title="Redo (Ctrl Y)">↷</button>
    <div class="tsep"></div>
    <button class="tbtn icon-only" onclick="openSaveModal()" title="Save project (Ctrl S)">💾</button>
    <button class="tbtn icon-only" onclick="openLoadModal()" title="Open project (Ctrl O)">📂</button>
    <div class="tsep"></div>
    <div class="tmenu-wrap">
      <button class="tbtn icon-only" onclick="toggleMoreMenu(event)" title="More">⋯</button>
      <div class="tmenu hidden" id="moreMenu">
        <button onclick="exportProjectFile(); closeMoreMenu();">⇩ Export project (.json)</button>
        <button onclick="document.getElementById('importFile').click(); closeMoreMenu();">⇧ Import project (.json)</button>
        <button onclick="openShortcutsModal(); closeMoreMenu();">⌨ Keyboard shortcuts</button>
      </div>
    </div>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importProjectFile(this.files[0])">
    <div class="toolbar-spacer"></div>
    <div class="autosave-indicator" id="autosaveIndicator" title="Autosaves to this browser as you work"><span class="autosave-dot" id="autosaveDot"></span>Autosaved</div>
  </div>


  <div class="layout">
    <div class="panel panel-elements">
      <div class="panel-head">Elements</div>
      <div class="panel-body">
        <div class="add-row">
          <button class="add-btn" onclick="addLayer('line')">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M2 17c3-9 5 9 8 0s5 9 8 0 4 4 4 4"/></svg></span>
            Add line
          </button>
          <button class="add-btn" onclick="addLayer('box')">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><rect x="4" y="6" width="16" height="12" rx="1"/></svg></span>
            Add box
          </button>
          <button class="add-btn" onclick="addLayer('shape')">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M12 3l9 18H3z"/></svg></span>
            Add shape
          </button>
          <button class="add-btn" onclick="addLayer('custom')">
            <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.6"><path d="M5 18L12 6L19 15" stroke-dasharray="1 3.2"/><circle cx="5" cy="18" r="1.6" fill="currentColor" stroke="none"/><circle cx="12" cy="6" r="1.6" fill="currentColor" stroke="none"/><circle cx="19" cy="15" r="1.6" fill="currentColor" stroke="none"/></svg></span>
            Add custom (dots)
          </button>
        </div>
        <div class="layers" id="layerList"></div>
      </div>
    </div>

    <div class="panel panel-canvas">
      <div class="canvas-toolbar">
        <label><input type="checkbox" id="gridToggle" checked onchange="toggleGrid()"> Ruled guide</label>
        <label style="margin-left:8px;"><input type="checkbox" id="snapGridToggle" checked> Snap Grid (10px)</label>
        <label><input type="checkbox" id="snapElementToggle" checked> Snap Ends</label>
        <label style="margin-left:8px;">Canvas W <input type="number" id="canvasW" value="1000" min="40" max="2000" onchange="resizeCanvasFromInputs()"></label>
        <label>Canvas H <input type="number" id="canvasH" value="160" min="40" max="2000" onchange="resizeCanvasFromInputs()"></label>
        <label>Zoom <input type="range" id="zoom" min="0.5" max="4" step="0.1" value="1.0" oninput="applyZoom()"></label>
      </div>
      <div class="canvas-wrap" id="canvasWrap">
        <div class="canvas-frame">
          <svg id="stage" xmlns="http://www.w3.org/2000/svg"></svg>
          <div class="canvas-resize-handle" id="canvasResizeHandle" title="Drag to resize canvas"></div>
        </div>
      </div>
    </div>

    <div class="panel panel-export">
      <div class="panel-head">Export</div>
      <div class="panel-body">
        <div class="export-btns">
          <button class="btn" onclick="copySvg()">Copy SVG</button>
          <button class="btn secondary" onclick="downloadSvg()">Download</button>
        </div>
        <div class="copy-flash" id="copyFlash"></div>
        <textarea id="svgOut" readonly></textarea>
      </div>
    </div>

    <div class="panel panel-params">

  const rad = -rotDeg*Math.PI/180;
  const dx = px-ox, dy = py-oy;
  return {
    lx: dx*Math.cos(rad) - dy*Math.sin(rad),
    ly: dx*Math.sin(rad) + dy*Math.cos(rad)
  };
}

function svgPointFromClient(clientX, clientY){
  const stage = document.getElementById('stage');
  const pt = stage.createSVGPoint();
  pt.x = clientX; pt.y = clientY;
  const ctm = stage.getScreenCTM();
  if(!ctm) return {x:0,y:0};
  const p = pt.matrixTransform(ctm.inverse());
  return {x:p.x, y:p.y};
}

function getSnapCoordinates(targetX, targetY, skipId) {
  const snapEl = document.getElementById('snapElementToggle').checked;

  const tolerance = 10;

  if (snapEl) {
    for (let l of layers) {
      if (l.id === skipId) continue;
      if (Math.hypot(targetX - l.params.x, targetY - l.params.y) < tolerance) {
        return { x: l.params.x, y: l.params.y };
      }
      if (l.type === 'line') {
        const rad = l.params.rotation * Math.PI / 180;
        const endX = l.params.x + l.params.length * Math.cos(rad);
        const endY = l.params.y + l.params.length * Math.sin(rad);
        if (Math.hypot(targetX - endX, targetY - endY) < tolerance) {
          return { x: endX, y: endY };
        }
      }
    }
  }

  if (snapGrid) {
    return {
      x: Math.round(targetX / 10) * 10,
      y: Math.round(targetY / 10) * 10

/* ============================= GEOMETRY / RENDER HELPERS ============================= */
function catmullRomPath(points){
  if(points.length<2) return '';
  if(points.length===2){
    return `M ${points[0].x.toFixed(2)},${points[0].y.toFixed(2)} L ${points[1].x.toFixed(2)},${points[1].y.toFixed(2)}`;
  }
  let d = `M ${points[0].x.toFixed(2)},${points[0].y.toFixed(2)} `;
  for(let i=0; i<points.length-1; i++){
    const p0 = points[i-1] || points[i];
    const p1 = points[i];
    const p2 = points[i+1];
    const p3 = points[i+2] || p2;
    const c1x = p1.x + (p2.x-p0.x)/6;
    const c1y = p1.y + (p2.y-p0.y)/6;
    const c2x = p2.x - (p3.x-p1.x)/6;
    const c2y = p2.y - (p3.y-p1.y)/6;
    d += `C ${c1x.toFixed(2)},${c1y.toFixed(2)} ${c2x.toFixed(2)},${c2y.toFixed(2)} ${p2.x.toFixed(2)},${p2.y.toFixed(2)} `;
  }
  return d.trim();
}

function samplePoints(p){
  const N = 250;
  const pts = [];
  const decayFactor = p.decay !== undefined ? p.decay : 0;
  for(let i=0; i<=N; i++){
    const t = i/N;
    const x = t*p.length;
    let y = 0;
    const amplitudeEnvelope = p.amplitude * (1 - t * decayFactor);

    if(p.lineType==='wavy'){
      y = amplitudeEnvelope * Math.sin(2*Math.PI*p.cycles*t + p.phase*Math.PI/180);
    } else if(p.lineType==='chirp'){
      const f0 = p.cycles, k = p.chirpRate;
      const phase = 2*Math.PI*f0*(t + k*t*t/2) + p.phase*Math.PI/180;
      const env = p.amplitude * Math.exp(-p.damping*t);
      y = env * Math.sin(phase);
    } else if(p.lineType==='arc'){
      y = -p.amplitude * Math.sin(Math.PI*t);
    }
    pts.push({x,y});
  }
  return pts;
}

function triangleWave(phase){
  let t = (phase / (2*Math.PI)) % 1;
  if(t < 0) t += 1;
  if(t < 0.25) return t*4;
  if(t < 0.75) return 1 - (t-0.25)*4;
  return -1 + (t-0.75)*4;
}

function dampedWavePoints(p){
  const N = 300;
  const totalLen = Math.max(1, p.length);
  const tailLength = clamp(p.tailLength !== undefined ? p.tailLength : 0, 0, totalLen - 5);
  const waveLength = Math.max(5, totalLen - tailLength);
  const ampStart = p.ampStart !== undefined ? p.ampStart : 20;
  const ampEnd = p.ampEnd !== undefined ? p.ampEnd : 0;
  const ampShape = p.ampShape !== undefined ? p.ampShape : 1.5;
  const periodStart = p.periodStart !== undefined ? p.periodStart : 30;
  const periodEnd = p.periodEnd !== undefined ? p.periodEnd : 110;
  const periodShape = p.periodShape !== undefined ? p.periodShape : 1.0;
  const dirMul = (p.startDirection === 'down') ? -1 : 1;
  const isZigzag = p.waveform === 'zigzag';
  const dx = waveLength / N;
  let phase = 0;
  const pts = [{x:0, y:0}];
  for(let i=1; i<=N; i++){
    const xMid = (i - 0.5) * dx;
    const uMid = xMid / waveLength;
    const per = Math.max(1, periodStart + (periodEnd - periodStart) * Math.pow(uMid, periodShape));
    phase += (2*Math.PI/per) * dx;
    const x = i * dx;
    const u = x / waveLength;
    const amp = ampEnd + (ampStart - ampEnd) * Math.pow(1 - u, ampShape);
    const shapeVal = isZigzag ? triangleWave(phase) : Math.sin(phase);
    const y = -amp * shapeVal * dirMul;
    pts.push({x, y});
  }
  if(tailLength > 0){
    const last = pts[pts.length-1];
    pts.push({x: last.x + tailLength, y: last.y});
  }
  if(p.reverseProgression){
    const end = pts[pts.length-1].x;
    return pts.map(pt=>({x: end - pt.x, y: pt.y})).reverse();
  }
  return pts;
}

function computeDampedWaveStats(p){
  const totalLen = Math.max(1, p.length || 0);
  const tailLength = clamp(p.tailLength !== undefined ? p.tailLength : 0, 0, totalLen - 5);
  const waveLength = Math.max(5, totalLen - tailLength);
  const N = 200;
  const dx = waveLength / N;
  let phase = 0;
  for(let i=1; i<=N; i++){
    const xMid = (i - 0.5) * dx;
    const per = Math.max(1, p.periodStart + (p.periodEnd - p.periodStart) * Math.pow(xMid/waveLength, p.periodShape));
    phase += (2*Math.PI/per) * dx;
  }
  return { cycles: phase/(2*Math.PI), waveLength, tailLength, totalLen };
}

function zigzagPoints(p){
  const segments = Math.max(2, Math.round(p.cycles*2));
  const pts = [{x:0,y:0}];
  const decayFactor = p.decay !== undefined ? p.decay : 0;
  for(let i=1; i<segments; i++){
    const t = i/segments;
    const x = t*p.length;
    const amplitudeEnvelope = p.amplitude * (1 - t * decayFactor);
    const y = (i%2===1) ? amplitudeEnvelope : -amplitudeEnvelope;
    pts.push({x,y});
  }
  pts.push({x:p.length,y:0});
  return pts;
}

function dashArrayFor(style, thickness){
  if(style==='dashed') return `${(thickness*3).toFixed(1)},${(thickness*2.2).toFixed(1)}`;
  if(style==='dotted') return `${(thickness*0.1).toFixed(1)},${(thickness*2.4).toFixed(1)}`;
  return 'none';
}

function getLinePoints(p){
  if(p.lineType==='straight') return [{x:0,y:0},{x:p.length,y:0}];
  if(p.lineType==='zigzag') return zigzagPoints(p);
  if(p.lineType==='dampedWave') return dampedWavePoints(p);
  return samplePoints(p);
}

function generateArrowheadHtml(anchorX, anchorY, angleRad, size, colors, style, strokeW, barbAngleDeg){
  const stroke = colors.stroke; const fill = colors.fill;
  const spread = (barbAngleDeg !== undefined && (style==='stroke' || style==='hollow'))
    ? size * Math.tan(clamp(barbAngleDeg,4,80) * Math.PI/180)
    : size * 0.42;
  
  // Base triangle facing right at (0,0)
  const tipX = size, tipY = 0;
  const leftX = 0, leftY = -spread;
  const rightX = 0, rightY = spread;
  
  let shape;
  if(style==='hollow'){
    shape = `<path d="M${tipX},${tipY} L${leftX},${leftY} L${rightX},${rightY} Z" fill="none" stroke="${stroke}" stroke-width="${strokeW}" stroke-linejoin="round"/>`;
  } else if(style==='flat'){
    const barHalf = size*0.5;
    shape = `<line x1="0" y1="${-barHalf}" x2="0" y2="${barHalf}" stroke="${stroke}" stroke-width="${strokeW}" stroke-linecap="round"/>`;
  } else if(style==='stroke') {
    shape = `<path d="M${tipX},${tipY} L${leftX},${leftY} M${tipX},${tipY} L${rightX},${rightY}" fill="none" stroke="${stroke}" stroke-width="${strokeW}" stroke-linejoin="round" stroke-linecap="round"/>`;
  } else {
    shape = `<path d="M${tipX},${tipY} L${leftX},${leftY} L${rightX},${rightY} Z" fill="${fill}"/>`;
  }
  
  const deg = (angleRad * 180 / Math.PI).toFixed(2);
  return `<g transform="translate(${anchorX.toFixed(2)}, ${anchorY.toFixed(2)}) rotate(${deg})">${shape}</g>`;
}

function renderArrowheads(pts, p, angleStart, angleEnd) {
  if (!p.arrowType || p.arrowType === 'none' || pts.length < 2) return '';
  
  let out = '';
  const placement = p.arrowPlacement || 'end';
  const size = p.arrowSize || 14;
  const strokeW = p.arrowStrokeWidth || p.thickness;
  const colors = { stroke: p.arrowStrokeColor || p.color, fill: p.arrowFillColor || p.color };
  const barbAngle = p.arrowBarbAngle;

  // End Head
  if (placement === 'end' || placement === 'both') {
    const last = pts[pts.length - 1];
    out += generateArrowheadHtml(last.x, last.y, angleEnd, size, colors, p.arrowType, strokeW, barbAngle);
  }
  
  // Start Head
  if (placement === 'start' || placement === 'both') {
    const first = pts[0];
    out += generateArrowheadHtml(first.x, first.y, angleStart, size, colors, p.arrowType, strokeW, barbAngle);
  }
  
  return out;
}

function lineElement(p){
  const pts = getLinePoints(p);
  let d = (p.lineType==='straight' || p.lineType==='zigzag' || p.lineType==='dampedWave')
    ? 'M ' + pts.map(pt=>`${pt.x.toFixed(2)},${pt.y.toFixed(2)}`).join(' L ') 
    : catmullRomPath(pts);

  const dash = dashArrayFor(p.dash, p.thickness);
  const vecEffect = p.fixedStroke ? ' vector-effect="non-scaling-stroke"' : '';
  let out = `<path d="${d}" fill="none" stroke="${p.color}" stroke-width="${p.thickness}" stroke-linecap="${p.cap}" stroke-linejoin="round"${dash!=='none' ? ` stroke-dasharray="${dash}"`:''}${vecEffect}/>`;
  
  // Always point straight relative to the main vector (Math.PI for start, 0 for end)
  out += renderArrowheads(pts, p, Math.PI, 0);
  return out;
}

function roundedRectPath(x,y,w,h,r){
  r = Math.max(0, Math.min(r, w/2, h/2));
  if(r<=0.01) return `M${x},${y} H${x+w} V${y+h} H${x} Z`;
  return `M${x+r},${y} H${x+w-r} A${r},${r} 0 0 1 ${x+w},${y+r} V${y+h-r} A${r},${r} 0 0 1 ${x+w-r},${y+h} H${x+r} A${r},${r} 0 0 1 ${x},${y+h-r} V${y+r} A${r},${r} 0 0 1 ${x+r},${y} Z`;
}

function boxElement(p){
  const vecEffect = p.fixedStroke ? ' vector-effect="non-scaling-stroke"' : '';
  return `<path d="${roundedRectPath(0,0,p.width,p.height,p.cornerRadius)}" fill="none" stroke="${p.color}" stroke-width="${p.thickness}"${vecEffect}/>`;
}

function starPathD(w,h){
  const cx=w/2, cy=h/2, outerRx=w/2, outerRy=h/2, innerRx=outerRx*0.382, innerRy=outerRy*0.382;
  let d='';
  for(let i=0;i<10;i++){
    const rx = i%2===0 ? outerRx : innerRx;
    const ry = i%2===0 ? outerRy : innerRy;
    const angle = -Math.PI/2 + i*Math.PI/5;
    const x = cx + rx*Math.cos(angle);
    const y = cy + ry*Math.sin(angle);
    d += (i===0?'M':'L') + x.toFixed(2) + ',' + y.toFixed(2) + ' ';
  }
  return d + 'Z';
}

function shapeElement(p){
  const w = p.width, h = p.height;
  const outline = p.fillMode==='outline';
  const fillAttr = outline ? 'none' : p.color;
  const vecEffect = p.fixedStroke ? ' vector-effect="non-scaling-stroke"' : '';
  const strokeAttr = outline ? `stroke="${p.color}" stroke-width="${p.thickness}"${vecEffect}` : '';
  if(p.shapeType==='circle'){
    return `<ellipse cx="${w/2}" cy="${h/2}" rx="${Math.max(0.5, w/2)}" ry="${Math.max(0.5, h/2)}" fill="${fillAttr}" ${strokeAttr}/>`;
  }
  if(p.shapeType==='triangle') return `<path d="M${w/2},0 L${w},${h} L0,${h} Z" fill="${fillAttr}" ${strokeAttr}/>`;
  if(p.shapeType==='diamond') return `<path d="M${w/2},0 L${w},${h/2} L${w/2},${h} L0,${h/2} Z" fill="${fillAttr}" ${strokeAttr}/>`;
  if(p.shapeType==='arrow'){
    const d = `M0,${h*0.4} L${w*0.6},${h*0.4} L${w*0.6},${h*0.2} L${w},${h*0.5} L${w*0.6},${h*0.8} L${w*0.6},${h*0.6} L0,${h*0.6} Z`;
    return `<path d="${d}" fill="${fillAttr}" ${strokeAttr}/>`;
  }
  if(p.shapeType==='cross') return `<path d="M${w/2},0 L${w/2},${h} M0,${h/2} L${w},${h/2}" fill="none" stroke="${p.color}" stroke-width="${p.thickness}" stroke-linecap="round"${vecEffect}/>`;
  if(p.shapeType==='star'){
    return `<path d="${starPathD(w,h)}" fill="${fillAttr}" ${strokeAttr}/>`;
  }
  return '';
}

function waveSegmentPoints(p0, p1, lineParams){
  const dx = p1.x-p0.x, dy = p1.y-p0.y;
  const segLen = Math.hypot(dx,dy);
  if(lineParams.lineType==='straight' || segLen<0.01){
    return [{x:p0.x,y:p0.y},{x:p1.x,y:p1.y}];
  }
  const angle = Math.atan2(dy,dx);
  const segParams = Object.assign({}, lineParams, {length:segLen});
  const localPts = lineParams.lineType==='zigzag' ? zigzagPoints(segParams)
    : lineParams.lineType==='dampedWave' ? dampedWavePoints(segParams)
    : samplePoints(segParams);
  const cos = Math.cos(angle), sin = Math.sin(angle);
  return localPts.map(pt=>({
    x: p0.x + pt.x*cos - pt.y*sin,
    y: p0.y + pt.x*sin + pt.y*cos
  }));
}

function customElement(p){
  const pts = p.points||[];
  if(pts.length<2) return '';
  const segCount = pts.length-1 + (p.closed && pts.length>2 ? 1 : 0);
  let allPts = [];
  for(let i=0; i<segCount; i++){
    const a = pts[i % pts.length];
    const b = pts[(i+1) % pts.length];
    let segPts = waveSegmentPoints(a, b, p);
    if(i>0) segPts = segPts.slice(1);
    allPts = allPts.concat(segPts);
  }
  let d;
  if(p.lineType==='straight' || p.lineType==='zigzag' || p.lineType==='dampedWave'){
    d = 'M ' + allPts.map(pt=>`${pt.x.toFixed(2)},${pt.y.toFixed(2)}`).join(' L ');
  } else {
    d = catmullRomPath(allPts);
  }
  if(p.closed) d += ' Z';
  const dash = dashArrayFor(p.dash, p.thickness);
  const vecEffect = p.fixedStroke ? ' vector-effect="non-scaling-stroke"' : '';
  let out = `<path d="${d}" fill="none" stroke="${p.color}" stroke-width="${p.thickness}" stroke-linecap="${p.cap}" stroke-linejoin="round"${dash!=='none' ? ` stroke-dasharray="${dash}"`:''}${vecEffect}/>`;
  
  if(!p.closed){
    // Calculate macro angles to keep the arrowhead straight ignoring local waves
    let angleStart = Math.PI;
    let angleEnd = 0;
    if(p.points && p.points.length >= 2) {
      const p0 = p.points[0], p1 = p.points[1];
      angleStart = Math.atan2(p0.y - p1.y, p0.x - p1.x); // outward from start segment
      
      const pL = p.points[p.points.length-1], pL_prev = p.points[p.points.length-2];
      angleEnd = Math.atan2(pL.y - pL_prev.y, pL.x - pL_prev.x); // outward from end segment
    }
    out += renderArrowheads(allPts, p, angleStart, angleEnd);
  }
  return out;
}

function rotatedWorldBBox(localMinX, localMinY, localMaxX, localMaxY, ox, oy, rotDeg, pad){
  const rad = (rotDeg || 0) * Math.PI / 180;
  const cos = Math.cos(rad), sin = Math.sin(rad);
  const corners = [
    {x:localMinX, y:localMinY}, {x:localMaxX, y:localMinY},
    {x:localMaxX, y:localMaxY}, {x:localMinX, y:localMaxY}
  ];
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  corners.forEach(c => {
    const wx = ox + c.x * cos - c.y * sin;
    const wy = oy + c.x * sin + c.y * cos;
    if(wx < minX) minX = wx; if(wx > maxX) maxX = wx;
    if(wy < minY) minY = wy; if(wy > maxY) maxY = wy;
  });
  return { minX: minX - pad, minY: minY - pad, maxX: maxX + pad, maxY: maxY + pad };
}

function customLocalPoints(p){
  const pts = p.points || [];
  if(pts.length < 2) return pts.slice();
  const segCount = pts.length - 1 + (p.closed && pts.length > 2 ? 1 : 0);
  let allPts = [];
  for(let i=0; i<segCount; i++){
    const a = pts[i % pts.length];
    const b = pts[(i+1) % pts.length];
    let segPts = waveSegmentPoints(a, b, p);
    if(i>0) segPts = segPts.slice(1);
    allPts = allPts.concat(segPts);
  }
  return allPts;
}

function localExtentOf(pts){
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  pts.forEach(pt => {
    if(pt.x < minX) minX = pt.x; if(pt.x > maxX) maxX = pt.x;
    if(pt.y < minY) minY = pt.y; if(pt.y > maxY) maxY = pt.y;
  });
  return { minX, minY, maxX, maxY };
}

function worldBBoxForLayer(layer){
  const p = layer.params;
  const strokeHalf = (typeof p.thickness === 'number') ? p.thickness/2 : 0;
  const margin = 2; // tiny buffer only, to avoid clipping anti-aliased stroke edges

  if (layer.type === 'line') {
    const hasArrow = p.arrowType && p.arrowType !== 'none';
    const arrowExtra = hasArrow ? (p.arrowSize || 14) : 0;
    const pad = strokeHalf + arrowExtra + margin;
    const ext = localExtentOf(getLinePoints(p));
    return rotatedWorldBBox(ext.minX, ext.minY, ext.maxX, ext.maxY, p.x, p.y, p.rotation, pad);
  }
  if (layer.type === 'custom') {
    const hasArrow = !p.closed && p.arrowType && p.arrowType !== 'none';
    const arrowExtra = hasArrow ? (p.arrowSize || 14) : 0;
    const pad = strokeHalf + arrowExtra + margin;
    const pts = customLocalPoints(p);
    if (!pts.length) return { minX: p.x - pad, minY: p.y - pad, maxX: p.x + pad, maxY: p.y + pad };
    const ext = localExtentOf(pts);
    return rotatedWorldBBox(ext.minX, ext.minY, ext.maxX, ext.maxY, p.x, p.y, p.rotation, pad);
  }
  // box / shape — local geometry is exactly the 0..width, 0..height rect
  const pad = strokeHalf + margin;
  const w = p.width || 100, h = p.height || 50;
  return rotatedWorldBBox(0, 0, w, h, p.x, p.y, p.rotation, pad);
}

function contentBBox(){
  const visible = layers.filter(l=>l.visible);
  if(!visible.length) return {minX:0,minY:0,maxX:canvasW,maxY:canvasH};
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  visible.forEach(l=>{
    const b = worldBBoxForLayer(l);
    if(b.minX < minX) minX=b.minX; if(b.maxX > maxX) maxX=b.maxX;
    if(b.minY < minY) minY=b.minY; if(b.maxY > maxY) maxY=b.maxY;
  });
  return {minX: Math.max(0, minX), minY: Math.max(0, minY), maxX: Math.min(canvasW, maxX), maxY: Math.min(canvasH, maxY)};
}

function renderLayerSvg(layer, interactive){
  const p = layer.params;
  let inner = '';
  if(layer.type==='line') inner = lineElement(p);
  else if(layer.type==='box') inner = boxElement(p);
  else if(layer.type==='shape') inner = shapeElement(p);
  else if(layer.type==='custom') inner = customElement(p);
  
  let hit = '';
  if(interactive){
    if(layer.type === 'custom') {
      const pts = p.points || [];
      if (pts.length) {
        const xs = pts.map(pt=>pt.x), ys = pts.map(pt=>pt.y);
        const minX = Math.min(...xs), maxX = Math.max(...xs);
        const minY = Math.min(...ys), maxY = Math.max(...ys);
        hit = `<rect data-id="${layer.id}" data-role="move" x="${minX-10}" y="${minY-10}" width="${maxX-minX+20}" height="${maxY-minY+20}" fill="transparent"/>`;
      } else {
        hit = `<rect data-id="${layer.id}" data-role="move" x="-20" y="-20" width="40" height="40" fill="transparent"/>`;
      }
    } else {
      const w = p.length || p.width || 40;
      const h = p.height || Math.max(20, p.amplitude * 2 || 20);
      hit = `<rect data-id="${layer.id}" data-role="move" x="0" y="${p.height ? 0 : -h/2}" width="${w}" height="${h}" fill="transparent"/>`;
    }
  }
  return `<g class="layer-group" data-id="${layer.id}" transform="translate(${p.x},${p.y}) rotate(${p.rotation})">${hit}${inner}</g>`;
}

function handleRect(id, role, x, y, extraClass){
  return `<rect class="handle ${extraClass||''}" data-id="${id}" data-role="${role}" x="${x}" y="${y}" width="10" height="10"/>`;
}

function selectionOverlaySvg(layer){
  const p = layer.params;
  let outline = '', handles = '';
  if(layer.type==='box' || layer.type==='shape'){
    outline = `<rect class="sel-outline" x="0" y="0" width="${p.width}" height="${p.height}"/>`;
    handles += handleRect(layer.id,'resize-e', p.width-5, p.height/2-5);
    handles += handleRect(layer.id,'resize-s', p.width/2-5, p.height-5);
    handles += handleRect(layer.id,'resize-se', p.width-5, p.height-5);
  } else if(layer.type==='line'){
    const amp = (p.lineType==='straight') ? 0 : (p.lineType==='dampedWave' ? Math.max(p.ampStart, p.ampEnd) : p.amplitude);
    outline = `<rect class="sel-outline" x="0" y="${-amp-4}" width="${p.length}" height="${amp*2+8}"/>`;
    handles += handleRect(layer.id,'line-end', p.length-5, -5);
    if(p.lineType!=='straight'){
      handles += handleRect(layer.id,'line-amp', p.length/2-5, -amp-5, 'amp');
    }
  } else if(layer.type==='custom'){
    const pts = p.points||[];
    if(pts.length){
      const xs = pts.map(pt=>pt.x), ys = pts.map(pt=>pt.y);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      outline = `<rect class="sel-outline" x="${minX-4}" y="${minY-4}" width="${maxX-minX+8}" height="${maxY-minY+8}"/>`;
    }
    handles += pts.map((pt,i)=>handleRect(layer.id, 'point:'+i, pt.x-5, pt.y-5, 'pt')).join('');
  }
  return `<g class="selection-overlay" transform="translate(${p.x},${p.y}) rotate(${p.rotation})">${outline}${handles}</g>`;
}

/* ============================= LAYER MANAGEMENT ============================= */
function addLayer(type){
  pushHistory();
  const id = 'el' + (uid++);
  const params = JSON.parse(JSON.stringify(DEFAULTS[type]));
  const count = layers.filter(l=>l.type===type).length + 1;
  layers.push({id, type, name:`${LABELS[type]} ${count}`, visible:true, params});
  selectedId = id;
  renderAll();
}
function deleteLayer(id, ev){
  if(ev) ev.stopPropagation();
  pushHistory();
  layers = layers.filter(l=>l.id!==id);
  if(selectedId===id) selectedId = layers.length ? layers[layers.length-1].id : null;
  renderAll();
}
function duplicateLayer(id, ev){
  if(ev) ev.stopPropagation();
  pushHistory();
  const src = layers.find(l=>l.id===id);
  if(!src) return;
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = 'el' + (uid++);
  copy.name = src.name + ' copy';
  copy.params.x = Math.min(canvasW, src.params.x + 20);
  copy.params.y = Math.min(canvasH, src.params.y + 20);
  layers.push(copy);
  selectedId = copy.id;
  renderAll();
}
function selectLayer(id){ selectedId = id; renderAll(); }
function moveLayer(id, dir, ev){
  ev.stopPropagation();
  const i = layers.findIndex(l=>l.id===id);
  const j = i + dir;
  if(j<0 || j>=layers.length) return;
  pushHistory();
  [layers[i], layers[j]] = [layers[j], layers[i]];
  renderAll();
}

/* ============================= PARAMS COPY / PASTE SYSTEM ============================= */
function copyElementParams(id) {
  const layer = layers.find(l => l.id === id);
  if (!layer) return;
  
  // Clone parameters but exclude geometric position/dots data so it overlays naturally
  const baseParams = JSON.parse(JSON.stringify(layer.params));
  delete baseParams.x;
  delete baseParams.y;
  delete baseParams.rotation;
  delete baseParams.points; // Keep macro shape, let dots be custom
  
  parameterClipboard = {
    sourceType: layer.type,
    params: baseParams
  };
  renderAll();
}

function pasteElementParams(id) {
  if (!parameterClipboard) return;
  const layer = layers.find(l => l.id === id);
  if (!layer) return;
  pushHistory();
  
  // Blend matching variables over without rewriting layout positioning
  if (layer.type === parameterClipboard.sourceType) {
    Object.assign(layer.params, parameterClipboard.params);
  } else {
    // Cross-element fallback paste for styling variables (ink, thickness etc.)
    const shareableKeys = ['thickness', 'color', 'fixedStroke', 'dash', 'cap', 'lineType', 'amplitude', 'cycles', 'phase', 'decay', 'chirpRate', 'damping'];
    shareableKeys.forEach(k => {
      if (parameterClipboard.params[k] !== undefined && layer.params[k] !== undefined) {
        layer.params[k] = parameterClipboard.params[k];
      }
    });
  }
  renderAll();
}

/* ============================= UI BUILD ============================= */
function buildLayerList(){
  const el = document.getElementById('layerList');
  if(!layers.length){
    el.innerHTML = '<div class="empty-note">No elements yet.</div>';
    return;
  }
  el.innerHTML = layers.map((l)=>`
    <div class="layer-row ${l.id===selectedId?'selected':''}" onclick="selectLayer('${l.id}')">
      <span class="tag">${l.type}</span>
      <span class="name">${l.name}</span>
      <button onclick="moveLayer('${l.id}',1,event)">↑</button>
      <button onclick="moveLayer('${l.id}',-1,event)">↓</button>
      <button onclick="duplicateLayer('${l.id}',event)">⧉</button>
      <button onclick="deleteLayer('${l.id}',event)">✕</button>
    </div>
  `).join('');
}

function renderField(f, layer){
  const val = layer.params[f.key];
  if(f.type==='range'){
    return `
      <div class="field">
        <label>${f.label}
          <input type="number" class="val-input" min="${f.min}" max="${f.max}" step="${f.step}" value="${val}"
            onchange="onFieldNumberChange(this,'${layer.id}','${f.key}')">
        </label>
        <input type="range" min="${f.min}" max="${f.max}" step="${f.step}" value="${val}"
          onmousedown="ensureHistorySnapshot()" ontouchstart="ensureHistorySnapshot()"
          oninput="onFieldRangeInput(this,'${layer.id}','${f.key}')"
          onchange="finalizeHistory()">
      </div>`;
  }
  if(f.type==='select'){
    return `
      <div class="field">
        <label>${f.label}</label>
        <select onchange="updateParam('${layer.id}','${f.key}', this.value, false)">
          ${f.options.map(o=>`<option value="${o}" ${o===val?'selected':''}>${o}</option>`).join('')}
        </select>
      </div>`;
  }
  if(f.type==='color'){
    return `
      <div class="field">
        <label>${f.label}</label>
        <input type="color" value="${val}" oninput="updateParam('${layer.id}','${f.key}', this.value, false)">
      </div>`;
  }
  if(f.type==='checkbox'){
    return `
      <div class="field checkbox">
        <input type="checkbox" id="chk_${layer.id}_${f.key}" ${val?'checked':''} onchange="updateParam('${layer.id}','${f.key}', this.checked, false)">
        <label for="chk_${layer.id}_${f.key}">${f.label}</label>
      </div>`;
  }
  return '';
}

function onFieldRangeInput(rangeEl, id, key){
  const numEl = rangeEl.closest('.field').querySelector('.val-input');
  if(numEl) numEl.value = rangeEl.value;
  updateParam(id, key, rangeEl.value, true, true);
}

function onFieldNumberChange(numEl, id, key){
  let v = parseFloat(numEl.value) || 0;
  updateParam(id, key, v, true, false);
}

const PAIR_KEYS = [['x','y'], ['width','height'], ['cycles','phase'], ['dash','cap'], ['waveform','startDirection']];
function areFieldsPaired(keyA, keyB){
  return PAIR_KEYS.some(([a,b]) => (a===keyA && b===keyB) || (a===keyB && b===keyA));
}

let activeParamGroup = null;
function switchParamTab(g){
  activeParamGroup = g;
  document.querySelectorAll('#paramBody .param-tab').forEach(el=> el.classList.toggle('active', el.dataset.group===g));
  document.querySelectorAll('#paramBody .param-tab-panel').forEach(el=> el.classList.toggle('active', el.dataset.group===g));
}

function renderSchemaFields(schema, layer){
  const groups = [];
  const byGroup = {};
  schema.forEach(f=>{
    if(!byGroup[f.group]){ byGroup[f.group] = []; groups.push(f.group); }
    byGroup[f.group].push(f);
  });
  if(!groups.includes(activeParamGroup)) activeParamGroup = groups[0];

  const tabs = groups.map(g=>
    `<button type="button" class="param-tab ${g===activeParamGroup?'active':''}" data-group="${g}" onclick="switchParamTab('${g}')">${GROUP_LABELS[g] || g}</button>`
  ).join('');

  const panels = groups.map(g=>{
    const fields = byGroup[g];
    let html = '';
    for(let i=0; i<fields.length; i++){
      const f = fields[i], next = fields[i+1];
      if(SUBHEADS[f.key]){
        html += `<div class="param-subhead">${SUBHEADS[f.key]}</div>`;
      }
      if(f.type===next?.type && (f.type==='range'||f.type==='select') && areFieldsPaired(f.key, next.key) && !SUBHEADS[next.key]){
        html += `<div class="field-row">${renderField(f, layer)}${renderField(next, layer)}</div>`;
        i++;
      } else {
        html += renderField(f, layer);
      }
    }
    return `<div class="param-tab-panel ${g===activeParamGroup?'active':''}" data-group="${g}">${html}</div>`;
  }).join('');

  return `<div class="param-tabs">${tabs}</div>${panels}`;
}

function buildParamPanel(){
  const title = document.getElementById('paramTitle');
  const body = document.getElementById('paramBody');
  const layer = layers.find(l=>l.id===selectedId);
  if(!layer){
    title.textContent = 'Parameters';
    body.innerHTML = '<div class="no-selection">Select an element to edit parameters.</div>';
    return;
  }
  title.textContent = layer.name + ' — parameters';
  
  let note = '<div class="mouse-note">Drag the shape on canvas to move it. Drag the red squares to resize';
  if(layer.type==='line') note += ' — the end square sets length &amp; angle, the green square sets amplitude.</div>';
  else if(layer.type==='custom') note = '<div class="mouse-note">Hold Ctrl while dragging any handle (or while adding dots) to keep it on the same horizontal line.</div>';
  else note += ' (hold Ctrl on the corner square to keep width &amp; height equal).</div>';
  
  // Clipboard Operations Bar
  const isClipboardEmpty = parameterClipboard === null;
  const pasteLabel = (!isClipboardEmpty && parameterClipboard.sourceType !== layer.type)
    ? `📥 Paste style (from ${parameterClipboard.sourceType})`
    : '📥 Paste style';
  const clipboardHtml = `
    <div style="display:flex; gap:8px; margin-bottom:14px; background:var(--paper-deep); padding:8px; border-radius:3px; border:1px solid var(--border);">
      <button class="btn secondary" style="font-size:12px; padding:6px 10px; flex:1;" onclick="copyElementParams('${layer.id}')" title="Copies this element's stroke &amp; shape settings — not its position">📋 Copy style</button>
      <button class="btn" style="font-size:12px; padding:6px 10px; flex:1;" ${isClipboardEmpty ? 'disabled style="opacity:0.4; cursor:not-allowed;"' : ''} onclick="pasteElementParams('${layer.id}')" title="Applies the copied style to this element">${pasteLabel}</button>
    </div>
  `;

  let customControls = '';
  if(layer.type==='custom'){
    const active = addPointMode && addPointLayerId===layer.id;
    const cid = `addpt_${layer.id}`;
    customControls = `
      <div class="field checkbox">
        <input type="checkbox" id="${cid}" ${active?'checked':''} onchange="toggleAddPoint('${layer.id}', this.checked)">
        <label for="${cid}" style="margin:0; font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--ink-soft);">Click canvas to add dots${active?' (active)':''}</label>
      </div>
      <div style="display:flex; gap:8px; margin-bottom:14px;">
        <button class="btn secondary" style="flex:1;" onclick="undoLastPoint('${layer.id}')">Undo last dot</button>
        <button class="btn secondary" style="flex:1;" onclick="clearPoints('${layer.id}')">Clear dots</button>
      </div>`;
  }

  let waveReadout = '';
  if(layer.params.lineType==='dampedWave' && layer.type!=='custom'){
    const stats = computeDampedWaveStats(layer.params);
    waveReadout = `<div class="wave-readout">
      <div class="cell"><div class="l">Cycles</div><div class="v">${stats.cycles.toFixed(2)}</div></div>
      <div class="cell"><div class="l">Wave span</div><div class="v">${stats.waveLength.toFixed(0)}px</div></div>
      <div class="cell"><div class="l">Amp ratio</div><div class="v">${layer.params.ampStart}→${layer.params.ampEnd}</div></div>
      <div class="cell"><div class="l">λ ratio</div><div class="v">${layer.params.periodStart}→${layer.params.periodEnd}</div></div>
    </div>`;
  }
  
  body.innerHTML = note + waveReadout + clipboardHtml + customControls + renderSchemaFields(schemaFor(layer), layer);
}

function toggleAddPoint(id, checked){
  addPointMode = checked;
  addPointLayerId = checked ? id : null;
  selectedId = id;
  const stage = document.getElementById('stage');
  if (checked) stage.classList.add('adding-points');
  else stage.classList.remove('adding-points');
  renderAll();
}
function undoLastPoint(id){
  const layer = layers.find(l=>l.id===id);
  if(!layer || !layer.params.points.length) return;
  pushHistory();
  layer.params.points.pop();
  renderAll();
}
function clearPoints(id){
  const layer = layers.find(l=>l.id===id);
  if(!layer) return;
  pushHistory();
  layer.params.points = [];
  renderAll();
}

function updateParam(id, key, value, numeric, liveOnly){
  const layer = layers.find(l=>l.id===id);
  if(!layer) return;
  if(!liveOnly && !historyPending) pushHistory();
  layer.params[key] = numeric ? parseFloat(value) : value;
  if(liveOnly){
    renderStage();
    document.getElementById('svgOut').value = fullSvgSource();
  } else {
    renderAll();
  }
}

/* ============================= STAGE / EXPORT ============================= */
function fullSvgSource(){
  const b = contentBBox();
  const w = Math.max(10, b.maxX - b.minX);
  const h = Math.max(10, b.maxY - b.minY);
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${b.minX.toFixed(1)} ${b.minY.toFixed(1)} ${w.toFixed(1)} ${h.toFixed(1)}" width="${w.toFixed(1)}" height="${h.toFixed(1)}">\n  ${layers.map(l=>renderLayerSvg(l, false)).join('\n  ')}\n</svg>`;
}

function renderStage(){
  const stage = document.getElementById('stage');
  stage.setAttribute('viewBox', `0 0 ${canvasW} ${canvasH}`);
  const zoom = parseFloat(document.getElementById('zoom').value || 1.0);
  stage.setAttribute('width', canvasW * zoom);
  stage.setAttribute('height', canvasH * zoom);
  const selLayer = layers.find(l=>l.id===selectedId);
  stage.innerHTML = layers.map(l=>renderLayerSvg(l, true)).join('\n') + (selLayer ? selectionOverlaySvg(selLayer) : '');
}

function renderAll(){
  buildLayerList();
  buildParamPanel();
  renderStage();
  document.getElementById('svgOut').value = fullSvgSource();
  updateHistoryButtons();
  scheduleAutosave();
}

function resizeCanvasFromInputs(){
  pushHistory();
  canvasW = parseInt(document.getElementById('canvasW').value) || 1000;
  canvasH = parseInt(document.getElementById('canvasH').value) || 160;
  renderAll();
}
function applyZoom(){ renderStage(); }
function toggleGrid(){ document.getElementById('canvasWrap').classList.toggle('no-grid', !document.getElementById('gridToggle').checked); }

function copySvg(){
  const ta = document.getElementById('svgOut'); ta.select();
  navigator.clipboard.writeText(ta.value).then(()=>{
    const flash = document.getElementById('copyFlash'); flash.textContent = 'Copied to clipboard.';
    setTimeout(()=>flash.textContent='', 1800);
  });
}
function downloadSvg(){
  const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([fullSvgSource()], {type:'image/svg+xml'}));
  a.download = 'aleatoric-element.svg'; a.click();
}

/* ============================= INTERACTION DRAG ENGINE ============================= */
function onStageMouseDown(e){
  if(addPointMode && addPointLayerId){
    const layer = layers.find(l=>l.id===addPointLayerId);
    if(layer && layer.type==='custom'){
      pushHistory();
      const pt = svgPointFromClient(e.clientX, e.clientY);
      const local = toLocal(pt.x, pt.y, layer.params.x, layer.params.y, layer.params.rotation);
      let nx = local.lx;
      let ny = local.ly;
      if(e.ctrlKey && layer.params.points.length > 0){
        ny = layer.params.points[layer.params.points.length - 1].y;
      }
      layer.params.points.push({x: nx, y: ny});
      renderAll();
      e.preventDefault();
      return;
    }
  }

  const hitEl = e.target.closest && e.target.closest('[data-id]');
  if(!hitEl){ selectedId = null; renderAll(); return; }
  
  const id = hitEl.getAttribute('data-id');
  const role = hitEl.getAttribute('data-role') || 'move';
  if(id !== selectedId){ selectedId = id; renderAll(); }
  
  const layer = layers.find(l=>l.id===id); if(!layer) return;
  const pt = svgPointFromClient(e.clientX, e.clientY);
  
  ensureHistorySnapshot();
  dragState = { id, role, startPt: pt, startX: layer.params.x, startY: layer.params.y, startLength: layer.params.length, startRotation: layer.params.rotation, startW: layer.params.width, startH: layer.params.height };
  
  if(role.startsWith('point:')){
    const idx = parseInt(role.split(':')[1]);
    dragState.pointIdx = idx;
    dragState.startPtX = layer.params.points[idx].x;
    dragState.startPtY = layer.params.points[idx].y;
  }
  
  e.preventDefault();
}

function onDocMouseMove(e){
  // Handle Global Canvas Framing Resize Engine
  if (canvasDragState) {
    const dx = (e.clientX - canvasDragState.startX) / canvasDragState.zoom;
    const dy = (e.clientY - canvasDragState.startY) / canvasDragState.zoom;
    canvasW = Math.max(40, Math.round(canvasDragState.startW + dx));
    canvasH = Math.max(40, Math.round(canvasDragState.startH + dy));
    document.getElementById('canvasW').value = canvasW;
    document.getElementById('canvasH').value = canvasH;
    renderAll();
    return;
  }

  if(!dragState) return;
  const layer = layers.find(l=>l.id===dragState.id); if(!layer) return;
  const pt = svgPointFromClient(e.clientX, e.clientY);
  const p = layer.params;
  
  if(dragState.role==='move'){
    const snapped = getSnapCoordinates(dragState.startX + (pt.x - dragState.startPt.x), dragState.startY + (pt.y - dragState.startPt.y), layer.id);
    p.x = snapped.x;
    p.y = snapped.y;
  } else if(dragState.role==='line-end'){
    const snapped = getSnapCoordinates(pt.x, pt.y, layer.id);
    const dx = snapped.x - p.x;
    const dy = snapped.y - p.y;
    p.length = clamp(Math.hypot(dx, dy), 10, 2000);
    p.rotation = Math.atan2(dy, dx) * 180 / Math.PI;
  } else if(dragState.role==='line-amp'){
    const local = toLocal(pt.x, pt.y, p.x, p.y, p.rotation);
    p.amplitude = clamp(Math.abs(local.ly), 0, 300);
  } else if(dragState.role==='resize-e'){
    const local = toLocal(pt.x, pt.y, p.x, p.y, p.rotation);
    p.width = clamp(local.lx, 10, 2000);
  } else if(dragState.role==='resize-s'){
    const local = toLocal(pt.x, pt.y, p.x, p.y, p.rotation);
    p.height = clamp(local.ly, 10, 2000);
  } else if(dragState.role==='resize-se'){
    const local = toLocal(pt.x, pt.y, p.x, p.y, p.rotation);
    if(e.ctrlKey) {
      const sz = clamp(Math.max(local.lx, local.ly), 10, 2000);
      p.width = sz;
      p.height = sz;
    } else {
      p.width = clamp(local.lx, 10, 2000);
      p.height = clamp(local.ly, 10, 2000);
    }
  } else if(dragState.role.startsWith('point:')){
    const local = toLocal(pt.x, pt.y, p.x, p.y, p.rotation);
    const idx = dragState.pointIdx;
    let nx = local.lx;
    let ny = local.ly;
    if(e.ctrlKey && idx > 0) {
      ny = p.points[idx - 1].y;
    }
    p.points[idx].x = nx;
    p.points[idx].y = ny;
  }
  renderStage();
  document.getElementById('svgOut').value = fullSvgSource();
}

function onDocMouseUp(){ 
  if(canvasDragState){ canvasDragState = null; renderAll(); finalizeHistory(); }
  if(dragState){ dragState = null; renderAll(); finalizeHistory(); } 
}

// Bind Canvas Frame Resize Handle
document.getElementById('canvasResizeHandle').addEventListener('mousedown', function(e) {
  const zoom = parseFloat(document.getElementById('zoom').value || 1.0);
  ensureHistorySnapshot();
  canvasDragState = {
    startX: e.clientX,
    startY: e.clientY,
    startW: canvasW,
    startH: canvasH,
    zoom: zoom
  };
  e.preventDefault();
  e.stopPropagation();
});

document.getElementById('stage').addEventListener('mousedown', onStageMouseDown);
document.addEventListener('mousemove', onDocMouseMove);
document.addEventListener('mouseup', onDocMouseUp);

/* ============================= HISTORY (UNDO / REDO) ============================= */
function snapshotState(){
  return JSON.stringify({ layers, canvasW, canvasH, selectedId, uid });
}
function applySnapshot(json){
  const s = JSON.parse(json);
  layers = s.layers; canvasW = s.canvasW; canvasH = s.canvasH; selectedId = s.selectedId; uid = s.uid;
  document.getElementById('canvasW').value = canvasW;
  document.getElementById('canvasH').value = canvasH;
}
function pushHistory(){
  if(isRestoringHistory) return;
  undoStack.push(snapshotState());
  if(undoStack.length > HISTORY_LIMIT) undoStack.shift();
  redoStack = [];
  historyPending = true;
  updateHistoryButtons();
}
function ensureHistorySnapshot(){
  if(historyPending || isRestoringHistory) return;
  pushHistory();
}
function finalizeHistory(){
  historyPending = false;
}
function undo(){
  if(!undoStack.length) return;
  finalizeHistory();
  redoStack.push(snapshotState());
  const prev = undoStack.pop();
  isRestoringHistory = true;
  applySnapshot(prev);
  isRestoringHistory = false;
  renderAll();
  updateHistoryButtons();
  showToast('Undo');
}
function redo(){
  if(!redoStack.length) return;
  undoStack.push(snapshotState());
  const next = redoStack.pop();
  isRestoringHistory = true;
  applySnapshot(next);
  isRestoringHistory = false;
  renderAll();
  updateHistoryButtons();
  showToast('Redo');
}
function updateHistoryButtons(){
  const u = document.getElementById('undoBtn'), r = document.getElementById('redoBtn');
  if(u) u.disabled = !undoStack.length;
  if(r) r.disabled = !redoStack.length;
}

/* ============================= LAYER CLIPBOARD (Ctrl+C/X/V) ============================= */
function copyLayerToClipboard(){
  const layer = layers.find(l=>l.id===selectedId);
  if(!layer) return;
  layerClipboard = JSON.parse(JSON.stringify(layer));
  showToast('Copied ' + layer.name);
}
function cutLayerToClipboard(){
  const layer = layers.find(l=>l.id===selectedId);
  if(!layer) return;
  layerClipboard = JSON.parse(JSON.stringify(layer));
  deleteLayer(layer.id);
  showToast('Cut ' + layer.name);
}
function pasteLayerFromClipboard(){
  if(!layerClipboard) return;
  pushHistory();
  const copy = JSON.parse(JSON.stringify(layerClipboard));
  copy.id = 'el' + (uid++);
  copy.name = layerClipboard.name + ' copy';
  copy.params.x = Math.min(canvasW, (layerClipboard.params.x||0) + 20);
  copy.params.y = Math.min(canvasH, (layerClipboard.params.y||0) + 20);
  layers.push(copy);
  selectedId = copy.id;
  renderAll();
  showToast('Pasted ' + copy.name);
}

/* ============================= NUDGE ============================= */
function nudgeSelected(dx, dy){
  const layer = layers.find(l=>l.id===selectedId);
  if(!layer) return;
  ensureHistorySnapshot();
  layer.params.x = (layer.params.x||0) + dx;
  layer.params.y = (layer.params.y||0) + dy;
  renderAll();
}

/* ============================= TOASTS ============================= */
function showToast(msg){
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  wrap.appendChild(t);
  requestAnimationFrame(()=> t.classList.add('show'));
  setTimeout(()=>{
    t.classList.remove('show');
    setTimeout(()=> t.remove(), 250);
  }, 1800);
}

/* ============================= MODALS ============================= */
function openModal(id){ document.getElementById(id).classList.remove('hidden'); }
function closeModal(id){ document.getElementById(id).classList.add('hidden'); }
function closeAllModals(){
  ['shortcutsModal','saveModal','loadModal'].forEach(closeModal);
}
function toggleMoreMenu(e){
  e.stopPropagation();
  document.getElementById('moreMenu').classList.toggle('hidden');
}
function closeMoreMenu(){ document.getElementById('moreMenu').classList.add('hidden'); }
document.addEventListener('click', function(e){
  const menu = document.getElementById('moreMenu');
  if(menu && !menu.classList.contains('hidden') && !e.target.closest('.tmenu-wrap')) closeMoreMenu();
});

const SHORTCUTS = [
  ['Undo', 'Ctrl Z'], ['Redo', 'Ctrl Y / Ctrl Shift Z'],
  ['Copy element', 'Ctrl C'], ['Cut element', 'Ctrl X'], ['Paste element', 'Ctrl V'],
  ['Duplicate element', 'Ctrl D'], ['Delete element', 'Delete / Backspace'],
  ['Nudge element', '↑ ↓ ← →'], ['Nudge by 10px', 'Shift + Arrow'],
  ['Deselect / cancel', 'Esc'],
  ['Save project', 'Ctrl S'], ['Open project', 'Ctrl O'],
  ['Show this list', '?']
];
function openShortcutsModal(){
  document.getElementById('shortcutList').innerHTML = SHORTCUTS.map(([label,keys])=>`
    <div class="shortcut-row">
      <span>${label}</span>
      <span class="keys">${keys.split(' / ').map(combo=>`<kbd>${combo}</kbd>`).join('<span style="align-self:center;color:var(--ink-faint);font-size:11px;">or</span>')}</span>
    </div>`).join('');
  openModal('shortcutsModal');
}

/* ============================= SAVE / LOAD PROJECTS ============================= */
function currentProjectData(){
  return { layers, canvasW, canvasH, savedAt: Date.now() };
}
function loadProjects(){
  try{
    return JSON.parse(localStorage.getItem(PROJECTS_KEY) || '{}');
  } catch(e){ return {}; }
}
function saveProjects(projects){
  try{ localStorage.setItem(PROJECTS_KEY, JSON.stringify(projects)); }
  catch(e){ showToast('Could not save — storage may be full'); }
}
function openSaveModal(){
  document.getElementById('saveNameInput').value = '';
  renderSaveModalList();
  openModal('saveModal');
  setTimeout(()=>document.getElementById('saveNameInput').focus(), 50);
}
function renderSaveModalList(){
  const projects = loadProjects();
  const names = Object.keys(projects);
  const list = document.getElementById('saveModalList');
  if(!names.length){ list.innerHTML = '<div class="empty-note">No saved projects yet.</div>'; return; }
  list.innerHTML = '<div class="empty-note" style="margin-bottom:6px;">Or overwrite an existing save:</div>' + names.map(n=>`
    <div class="project-row">
      <span class="pname">${escapeHtml(n)}</span>
      <span class="pmeta">${new Date(projects[n].savedAt).toLocaleDateString()}</span>
      <button onclick="doSaveProject('${escapeAttr(n)}')">Overwrite</button>
    </div>`).join('');
}
function doSaveProject(existingName){
  const name = existingName || document.getElementById('saveNameInput').value.trim();
  if(!name){ showToast('Give the project a name first'); return; }
  const projects = loadProjects();
  projects[name] = currentProjectData();
  saveProjects(projects);
  closeModal('saveModal');
  showToast('Saved "' + name + '"');
}
function openLoadModal(){
  renderLoadModalList();
  openModal('loadModal');
}
function renderLoadModalList(){
  const projects = loadProjects();
  const names = Object.keys(projects).sort((a,b)=>projects[b].savedAt - projects[a].savedAt);
  const list = document.getElementById('loadModalList');
  if(!names.length){ list.innerHTML = '<div class="empty-note">No saved projects yet. Use Save to create one.</div>'; return; }
  list.innerHTML = names.map(n=>`
    <div class="project-row">
      <span class="pname">${escapeHtml(n)}</span>
      <span class="pmeta">${new Date(projects[n].savedAt).toLocaleString()}</span>
      <button onclick="doLoadProject('${escapeAttr(n)}')">Load</button>
      <button onclick="doDeleteProject('${escapeAttr(n)}')">Delete</button>
    </div>`).join('');
}
function doLoadProject(name){
  const projects = loadProjects();
  const data = projects[name];
  if(!data) return;
  pushHistory();
  layers = JSON.parse(JSON.stringify(data.layers));
  canvasW = data.canvasW; canvasH = data.canvasH;
  selectedId = layers.length ? layers[0].id : null;
  document.getElementById('canvasW').value = canvasW;
  document.getElementById('canvasH').value = canvasH;
  renderAll();
  closeModal('loadModal');
  showToast('Loaded "' + name + '"');
}
function doDeleteProject(name){
  const projects = loadProjects();
  delete projects[name];
  saveProjects(projects);
  renderLoadModalList();
}
function newProject(){
  if(layers.length && !confirm('Start a new project? Unsaved changes will be lost unless already saved.')) return;
  pushHistory();
  layers = [];
  selectedId = null;
  addLayer('line');
  showToast('New project started');
}
function exportProjectFile(){
  const data = currentProjectData();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], {type:'application/json'}));
  a.download = 'aleatoric-project.json';
  a.click();
  showToast('Project exported');
}
function importProjectFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      if(!data.layers) throw new Error('bad format');
      pushHistory();
      layers = data.layers;
      canvasW = data.canvasW || canvasW;
      canvasH = data.canvasH || canvasH;
      selectedId = layers.length ? layers[0].id : null;
      document.getElementById('canvasW').value = canvasW;
      document.getElementById('canvasH').value = canvasH;
      renderAll();
      showToast('Project imported');
    } catch(err){
      showToast('Could not read that file');
    }
  };
  reader.readAsText(file);
  document.getElementById('importFile').value = '';
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return String(s).replace(/'/g, "\\'"); }

/* ============================= AUTOSAVE ============================= */
function scheduleAutosave(){
  if(!autosaveArmed) return;
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(doAutosave, 600);
}
function doAutosave(){
  try{
    localStorage.setItem(AUTOSAVE_KEY, JSON.stringify(currentProjectData()));
    const dot = document.getElementById('autosaveDot');
    if(dot){ dot.classList.add('pulse'); setTimeout(()=>dot.classList.remove('pulse'), 500); }
  } catch(e){ /* storage unavailable — silently skip */ }
}


/* ============================= KEYBOARD SHORTCUTS ============================= */
document.addEventListener('keydown', function(e){
  const typing = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName) || document.activeElement.isContentEditable;
  const mod = e.ctrlKey || e.metaKey;

  // Modal escape / shortcuts help always available
  if(e.key === 'Escape'){
    const anyModalOpen = ['shortcutsModal','saveModal','loadModal'].some(id=>!document.getElementById(id).classList.contains('hidden'));
    if(anyModalOpen){ closeAllModals(); e.preventDefault(); return; }
    if(addPointMode){ toggleAddPoint(addPointLayerId, false); e.preventDefault(); return; }
    if(selectedId){ selectedId = null; renderAll(); e.preventDefault(); }
    return;
  }
  if(typing) return;

  if(e.key === '?'){ openShortcutsModal(); e.preventDefault(); return; }

  if(mod && (e.key==='z' || e.key==='Z')){
    if(e.shiftKey) redo(); else undo();
    e.preventDefault(); return;
  }
  if(mod && (e.key==='y' || e.key==='Y')){ redo(); e.preventDefault(); return; }
  if(mod && (e.key==='c' || e.key==='C')){ if(selectedId){ copyLayerToClipboard(); e.preventDefault(); } return; }
  if(mod && (e.key==='x' || e.key==='X')){ if(selectedId){ cutLayerToClipboard(); e.preventDefault(); } return; }
  if(mod && (e.key==='v' || e.key==='V')){ if(layerClipboard){ pasteLayerFromClipboard(); e.preventDefault(); } return; }
  if(mod && (e.key==='d' || e.key==='D')){ if(selectedId){ duplicateLayer(selectedId, {stopPropagation(){}}); e.preventDefault(); } return; }
  if(mod && (e.key==='s' || e.key==='S')){ openSaveModal(); e.preventDefault(); return; }
  if(mod && (e.key==='o' || e.key==='O')){ openLoadModal(); e.preventDefault(); return; }

  if((e.key === 'Backspace' || e.key === 'Delete')){
    if(selectedId) { deleteLayer(selectedId); e.preventDefault(); }
    return;
  }

  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    if(!selectedId) return;
    const step = e.shiftKey ? 10 : 1;
    const map = { ArrowUp:[0,-step], ArrowDown:[0,step], ArrowLeft:[-step,0], ArrowRight:[step,0] };
    const [dx,dy] = map[e.key];
    nudgeSelected(dx,dy);
    e.preventDefault();
  }
});
document.addEventListener('keyup', function(e){
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) finalizeHistory();
});

/* ============================= INITIAL STATE ============================= */
(function init(){
  try{ localStorage.removeItem(AUTOSAVE_KEY); } catch(e){}
  autosaveArmed = true;
  addLayer('line');
  undoStack = []; redoStack = []; updateHistoryButtons();
  renderAll();
})();
</script>
